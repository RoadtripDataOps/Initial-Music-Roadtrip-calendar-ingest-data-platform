openapi: 3.1.0
x-stoplight:
  id: xdv7rgbi1x762
info:
  description: Enhance your offering with concert data from JamBase.
  version: 1.0.0
  title: JamBase Concert Data API
  contact:
    email: developer@jambase.com
    name: Team JamBase
    url: 'https://www.jambase.com/contact'
  license:
    name: Apache 2.0
    url: 'http://www.apache.org/licenses/LICENSE-2.0.html'
  termsOfService: 'https://www.jambase.com/terms'
  summary: Enhance your offering with concert data from JamBase.
tags:
  - name: Events
    description: Search Events
  - name: Streams
    description: Search Streams
  - name: Artists
    description: Search Artists
  - name: Venues
    description: Search Venues
  - name: Geographies
    description: 'Lookup Countries, Cities, Etc'
  - name: Genres
    description: Lookup Genres
  - name: Lookups
    description: Lookup Identifiers
  - name: Enums
    description: Enumerators for filters
security:
  - ApiKeyAuth: []
paths:
  /events:
    get:
      tags:
        - Events
      summary: Search Events
      operationId: searchEvents
      description: |
        Search events by location, date, artist, genre, and more.
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/eventTypeParam'
        - $ref: '#/components/parameters/artistIdParam'
        - $ref: '#/components/parameters/artistNameParam'
        - $ref: '#/components/parameters/genreSlugParam'
        - $ref: '#/components/parameters/venueIdParam'
        - $ref: '#/components/parameters/venueNameParam'
        - $ref: '#/components/parameters/geoCityIdParam'
        - $ref: '#/components/parameters/geoCountryIso2Param'
        - $ref: '#/components/parameters/geoCountryIso3Param'
        - $ref: '#/components/parameters/geoIpParam'
        - $ref: '#/components/parameters/geoLatitudeParam'
        - $ref: '#/components/parameters/geoLongitudeParam'
        - $ref: '#/components/parameters/geoMetroIdParam'
        - $ref: '#/components/parameters/geoRadiusAmountParam'
        - $ref: '#/components/parameters/geoRadiusUnitsParam'
        - $ref: '#/components/parameters/geoStateIsoParam'
        - $ref: '#/components/parameters/datePresetParam'
        - $ref: '#/components/parameters/dateFromParam'
        - $ref: '#/components/parameters/dateToParam'
        - in: query
          name: eventDataSource
          description: The EventDataSource of for the Event.
          schema:
            $ref: '#/components/schemas/enumEventDataSource'
        - $ref: '#/components/parameters/dateModifiedFromParam'
        - $ref: '#/components/parameters/datePublishedFromParam'
        - $ref: '#/components/parameters/expandExternalIdentifiersParam'
        - $ref: '#/components/parameters/expandArtistSameAsParam'
        - $ref: '#/components/parameters/expandPastEventsParam'
        - $ref: '#/components/parameters/excludeEventPerformersParam'
      responses:
        '200':
          $ref: '#/components/responses/searchEventsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  '/events/id/{eventDataSource}:{eventId}':
    get:
      tags:
        - Events
      summary: Get an Upcoming Event
      operationId: getUpcomingEvent
      description: |
        Retrieve a specific Event by JamBase or third-party ID
      parameters:
        - in: path
          name: eventDataSource
          description: The eventDataSource of the ID for the Event.
          required: true
          schema:
            $ref: '#/components/schemas/enumEventDataSource'
        - in: path
          name: eventId
          description: The unique ID for the Event.
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/expandExternalIdentifiersParam'
        - $ref: '#/components/parameters/expandArtistSameAsParam'
      responses:
        '200':
          $ref: '#/components/responses/getSingleUpcomingEventResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /streams:
    get:
      tags:
        - Streams
      summary: Search Upcoming Streams
      operationId: searchUpcomingStreams
      description: |
        Search upcoming streams by date, artist, genre, and more.
        Past streams are not available via the API.
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/datePresetParam'
        - $ref: '#/components/parameters/dateFromParam'
        - $ref: '#/components/parameters/dateToParam'
        - $ref: '#/components/parameters/streamDataSourceParam'
        - $ref: '#/components/parameters/dateModifiedFromParam'
        - $ref: '#/components/parameters/datePublishedFromParam'
        - $ref: '#/components/parameters/expandExternalIdentifiersParam'
        - $ref: '#/components/parameters/expandArtistSameAsParam'
      responses:
        '200':
          $ref: '#/components/responses/searchUpcomingStreamsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  '/streams/id/{streamDataSource}:{streamId}':
    get:
      tags:
        - Streams
      summary: Get an Upcoming Stream
      operationId: getStream
      description: |
        Retrieve a specific stream by JamBase or third-party ID.
      parameters:
        - in: path
          name: streamDataSource
          description: The StreamDataSource of the ID for the Stream.
          required: true
          schema:
            $ref: '#/components/schemas/enumStreamDataSource'
        - in: path
          name: streamId
          description: The unique ID for the Stream.
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/expandExternalIdentifiersParam'
        - $ref: '#/components/parameters/expandArtistSameAsParam'
      responses:
        '200':
          $ref: '#/components/responses/getSingleUpcomingStreamResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /artists:
    get:
      tags:
        - Artists
      summary: Search Artists
      operationId: searchArtists
      description: |
        Search artists by name and genre. 
        <!-- theme: info -->
        > #### Requirement
        > Your request must include at least one of the `artistName` or `genreSlug` parameters.
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/artistNameParam'
        - $ref: '#/components/parameters/genreSlugParam'
        - in: query
          name: artistHasUpcomingEvents
          description: Set to true to only return artists that have at least one upcoming Concert or Festival
          schema:
            type: boolean
        - $ref: '#/components/parameters/dateModifiedFromParam'
        - $ref: '#/components/parameters/datePublishedFromParam'
        - $ref: '#/components/parameters/expandExternalIdentifiersParam'
      responses:
        '200':
          $ref: '#/components/responses/searchArtistsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  '/artists/id/{artistDataSource}:{artistId}':
    get:
      tags:
        - Artists
      summary: Get an Artist
      operationId: getSingleArtist
      description: |
        Retrieve a specific artist by JamBase or third-party ID.
      parameters:
        - in: path
          name: artistDataSource
          description: the ArtistDataSource of the ID for the artist
          required: true
          schema:
            $ref: '#/components/schemas/enumArtistDataSource'
        - in: path
          name: artistId
          description: the unique ID for the artist
          required: true
          schema:
            type: string
        - in: query
          name: expandUpcomingEvents
          description: Use `true` to include the `event` node with any upcoming events for the artist.
          schema:
            type: boolean
            default: false
        - in: query
          name: expandUpcomingStreams
          description: Use `true` to include the `event` node with any upcoming Streams for the venue.
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/excludeEventPerformersParam'
        - $ref: '#/components/parameters/expandExternalIdentifiersParam'
        - $ref: '#/components/parameters/expandPastEventsParam'
      responses:
        '200':
          $ref: '#/components/responses/getSingleArtistResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /venues:
    get:
      tags:
        - Venues
      summary: Search Venues
      operationId: searchVenues
      description: |
        Search venues by location and more.

        <!-- theme: info  -->
        > #### Requirement
        >
        > Your request must include at the `venueName` or at least one of the geo parameters such as `geoCityId`, `geoCountryIso2`, `geoCountryIso3`, `geoIp`, `geoMetroId`, `geoStateIso`, or , `geoLatitude` and `geoLongitude`.
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/venueNameParam'
        - $ref: '#/components/parameters/geoCityIdParam'
        - $ref: '#/components/parameters/geoCountryIso2Param'
        - $ref: '#/components/parameters/geoCountryIso3Param'
        - $ref: '#/components/parameters/geoIpParam'
        - $ref: '#/components/parameters/geoLatitudeParam'
        - $ref: '#/components/parameters/geoLongitudeParam'
        - $ref: '#/components/parameters/geoMetroIdParam'
        - $ref: '#/components/parameters/geoRadiusAmountParam'
        - $ref: '#/components/parameters/geoRadiusUnitsParam'
        - $ref: '#/components/parameters/geoStateIsoParam'
        - $ref: '#/components/parameters/dateModifiedFromParam'
        - $ref: '#/components/parameters/datePublishedFromParam'
        - in: query
          name: venueHasUpcomingEvents
          description: Set to true to only return venues that have at least one upcoming event
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/expandExternalIdentifiersParam'
      responses:
        '200':
          $ref: '#/components/responses/searchVenuesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  '/venues/id/{venueDataSource}:{venueId}':
    get:
      tags:
        - Venues
      summary: Get a Venue
      operationId: getSingleVenue
      description: |
        Retrieve a specific venue by JamBase or third-party ID.
      parameters:
        - in: path
          name: venueDataSource
          description: the VenueDataSource of the ID for the artist
          required: true
          schema:
            $ref: '#/components/schemas/enumVenueDataSource'
        - in: path
          name: venueId
          description: the unique ID for the Venue
          required: true
          schema:
            type: string
        - in: query
          name: expandUpcomingEvents
          description: Use `true` to include the `event` node with any upcoming Concerts and Festivals for the venue.
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/excludeEventPerformersParam'
        - $ref: '#/components/parameters/expandExternalIdentifiersParam'
        - $ref: '#/components/parameters/expandArtistSameAsParam'
      responses:
        '200':
          $ref: '#/components/responses/getSingleVenueResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /geographies/cities:
    get:
      tags:
        - Geographies
      summary: Search Cities
      operationId: searchCities
      description: |
        Search for cities. Results will be returned in order of most to least upcoming events in the city, and then alphabetically city name in the case of a tie.       

        <!-- theme: info  -->
        > #### Requirement
        > Your request must include at least one of the geo parameters such as `geoCityName`, `geoCountryIso2`, `geoCountryIso3`, `geoIp`, `geoMetroId`, `geoMetroName`, `geoStateIso`, or `geoLatitude` and `geoLongitude`.
            
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/geoCityNameParam'
        - $ref: '#/components/parameters/geoCountryIso2Param'
        - $ref: '#/components/parameters/geoCountryIso3Param'
        - $ref: '#/components/parameters/geoIpParam'
        - $ref: '#/components/parameters/geoLatitudeParam'
        - $ref: '#/components/parameters/geoLongitudeParam'
        - $ref: '#/components/parameters/geoMetroIdParam'
        - $ref: '#/components/parameters/geoRadiusAmountParam'
        - $ref: '#/components/parameters/geoRadiusUnitsParam'
        - $ref: '#/components/parameters/geoStateIsoParam'
        - schema:
            type: boolean
          in: query
          name: cityHasUpcomingEvents
          description: Only include Cities with / without upcoming events. Omit for both.
      responses:
        '200':
          description: A list of Cities
          content:
            application/json:
              schema:
                title: searchCitiesResponseSchema
                description: An array of `City` objects
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/Success'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  cities:
                    type: array
                    items:
                      $ref: '#/components/schemas/City'
                  request:
                    $ref: '#/components/schemas/Request'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /geographies/metros:
    get:
      tags:
        - Geographies
      summary: Get Metros
      operationId: getMetros
      description: |
        A Metro is a collection of Cities, such as the Los Angeles area which includes LA, Hollywood, Anaheim, and more that can be used to filter Events.\
        \
        Returns all Metros in Alphabetical order by identifier.
      responses:
        '200':
          description: A list of Metros
          content:
            application/json:
              schema:
                description: An array of `Metro` objects with member `City` objects
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/Success'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                    x-stoplight:
                      id: w8jf412psm43g
                  metros:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdministrativeArea'
                  request:
                    $ref: '#/components/schemas/Request'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/UnauthorizedError'
      parameters:
        - in: query
          name: metroHasUpcomingEvents
          description: Only include Metros with / without upcoming events. Omit for both.
          schema:
            type: boolean
        - in: query
          name: cityHasUpcomingEvents
          description: Only include Cities with / without upcoming events. Omit for both.
          schema:
            type: boolean
        - in: query
          name: expandMetroCities
          description: Use `true` to include the `containsPlace` node with the cities for each metro.
          schema:
            type: boolean
            default: false
  /geographies/states:
    get:
      tags:
        - Geographies
      summary: Get States / Regions / Provinces
      operationId: getStates
      description: |
        A States (or Region / Province) is a collection of Cities, such as California (USA) or Quebec (Canada) that can be used to filter Events.\
        \
        Returns all States/Regions in Alphabetical order by identifier.
        \
        Note: Available for United States, Canada, and Australia only.
      responses:
        '200':
          description: A list of States
          content:
            application/json:
              schema:
                title: getStatesResponseSchema
                description: An array of `States` objects
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/Success'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                    x-stoplight:
                      id: pwzyvj1odd8es
                  states:
                    type: array
                    items:
                      $ref: '#/components/schemas/State'
                  request:
                    $ref: '#/components/schemas/Request'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/UnauthorizedError'
      parameters:
        - schema:
            type: boolean
          in: query
          name: stateHasUpcomingEvents
          description: Only include States with / without upcoming events. Omit for both.
  /geographies/countries:
    get:
      tags:
        - Geographies
      summary: Get Countries
      operationId: getCountries
      description: |
        Returns all Countries in alphabetical order by ISO2.
      responses:
        '200':
          description: A list of Countries
          content:
            application/json:
              schema:
                description: An array of `Country` objects
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/Success'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                    x-stoplight:
                      id: nkhefgyd1zwbq
                  countries:
                    type: array
                    items:
                      $ref: '#/components/schemas/Country'
                  request:
                    $ref: '#/components/schemas/Request'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/UnauthorizedError'
      parameters:
        - schema:
            type: boolean
          in: query
          name: countryHasUpcomingEvents
          description: Only include Countries with / without upcoming events. Omit for both.
  /lookups/event-data-sources:
    get:
      tags:
        - Lookups
      summary: Get Event Data Sources
      operationId: getEventDataSources
      description: |
        These can be used to filter events by Event IDs from third-party Data Sources.\
        \
        Returns all Event Data Sources in Alphabetical order.
      responses:
        '200':
          $ref: Jambase-DataSources-Event-Response-200.yaml
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /lookups/stream-data-sources:
    get:
      tags:
        - Lookups
      summary: Get Stream Data Sources
      operationId: getstreamDataSources
      description: |
        These can be used to filter Streams from a specific Streaming platform.\
        \
        Returns all Stream Data Sources in Alphabetical order.
      responses:
        '200':
          $ref: Jambase-DataSources-Stream-Response-200.yaml
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /lookups/artist-data-sources:
    get:
      tags:
        - Lookups
      summary: Get Artist Data Sources
      operationId: getArtistDataSources
      description: |
        These can be used to filter events by Artist IDs from third-party Data Sources.\
        \
        Returns all Artist Data Sources in Alphabetical order.
      responses:
        '200':
          $ref: Jambase-DataSources-Artist-Response-200.yaml
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /lookups/venue-data-sources:
    get:
      tags:
        - Lookups
      summary: Get Venue Data Sources
      operationId: getVenueDataSources
      description: |
        These can be used to filter events by Venue IDs from third-party Data Sources.\
        \
        This endpoint returns all Venue Data Sources in Alphabetical order.
      responses:
        '200':
          $ref: Jambase-DataSources-Venue-Response-200.yaml
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /genres:
    get:
      tags:
        - Genres
      summary: Get Genres
      operationId: getGenres
      description: |
        These can be used to filter Artists and Events.\
        \
        Returns all Genres in Alphabetical order.
      responses:
        '200':
          $ref: Jambase-Genres-Response-200.yaml
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: query
      name: apikey
      description: ''
  parameters:
    pageParam:
      in: query
      name: page
      description: Page number of results to retrieve
      required: false
      schema:
        type: integer
        default: 1
    perPageParam:
      in: query
      name: perPage
      description: Number of events per page of results
      required: false
      schema:
        type: integer
        default: 40
        minimum: 1
        maximum: 100
    eventTypeParam:
      in: query
      name: eventType
      description: |
        Used to isolate only concerts or only festivals(s)\
        Leave blank to include both concerts and festivals
        - eventType=concert
        - eventType=festival
      schema:
        $ref: '#/components/schemas/enumEventType'
    artistIdParam:
      in: query
      name: artistId
      description: |
        The source and unique identifier for the artist(s).\
        \
        For example to search for LCD Soundsystem events:

        - artistId=jambase:228924

        Use a pipe (|) to include multiple artist IDs.\
        \
        For example to search for LCD Soundsystem & Khalid events:
        - artistId=jambase:228924|jambase:3074545

        To use non-JamBase data sources, use the ArtistDataSource [[enum](#)] for the ID(s) you are using.\
        \
        For example to search for LCD Soundsystem events using their Ticketmaster ID:
          - artistId=ticketmaster:K8vZ9175st0
      schema:
        type: string
        example: 'jambase:228924'
    artistNameParam:
      in: query
      name: artistName
      description: |
        A keyword-based search for artist name(s).
        - artistName=Billie%20Eilish

        Use a pipe (|) to include multiple artist names.
        - artistName=Billie%20Eilish|Lucy%20Dacus

        Keywords should be URL Encoded.\
        For more precise artist-specific results try using `artistId` or `artist[slug]`.

        Please note that `artistName` cannot be used togehter with `artistId` type searches and will be ignored if `artistId` is provided.
      example: Billie Eilish
      schema:
        type: string
    genreSlugParam:
      in: query
      name: genreSlug
      description: |
        Restrict results to a genre.
        - genreSlug=bluegrass

        Use a pipe (|) to include results from multiple genres.
        - genreSlug=bluegrass|blues
      schema:
        $ref: '#/components/schemas/enumGenres'
    venueIdParam:
      in: query
      name: venueId
      description: |
        The source and unique identifier for the venue(s)
        - venueId=jambase:62108

        Use a pipe (|) to include multiple venue IDs
        - venueId=jambase:62108|jambase:7932731

        To use non-JamBase IDs, use the <a href="https://apidocs.jambase.com/docs/jambase-api/vg16q2jczs7fg-enum-venue-data-source">source slug</a> for the ID(s) you are using
        - venueId=ticketmaster:k7vGF99ORYpnS
      example: 'jambase:62108'
      schema:
        type: string
    venueNameParam:
      in: query
      name: venueName
      description: |
        A keyword-based search for venue name(s).
        - venueName=Brooklyn%20Bowl

        Use a pipe (|) to include multiple venue IDs.
        - venueName=Brooklyn%20Bowl|House%20of%20Blues

        For more precise venue-specific results try using `venueId` or `venue[slug]`.
      example: Brooklyn%20Bowl
      schema:
        type: string
    geoLatitudeParam:
      in: query
      name: geoLatitude
      description: |
        The latitude for geographic radius.
        - geoLatitude=40.7505
      schema:
        $ref: '#/components/schemas/propLatitude'
    geoLongitudeParam:
      in: query
      name: geoLongitude
      description: |
        The longitude for geographic radius.
        - geoLongitude=-73.9934
      schema:
        $ref: '#/components/schemas/propLongitude'
    geoStateIsoParam:
      in: query
      name: geoStateIso
      description: |
        The State code in ISO_3166-2 format [[docs](https://en.wikipedia.org/wiki/ISO_3166-2)].
        - geoStateIso=US-NY

        Use a pipe (|) to include multiple State codes.
        - geoStateIso=US-NY|=US-PA

        Note: Available for United States, Canada, and Australia only.
      schema:
        $ref: '#/components/schemas/enumState'
    geoMetroIdParam:
      in: query
      name: geoMetroId
      description: |
        Use to retrieve events for specific <a href="https://apidocs.jambase.com/docs/jambase-api/5b89026bb2462-get-metros">metro ID(s)</a>.
        - geoMetroId=jambase:1

        Use a pipe (|) to include multiple metro IDs.
        - geoMetroId=jambase:1|jambase:5
      example: 'jambase:1'
      schema:
        type: string
    geoCityNameParam:
      in: query
      name: geoCityName
      description: |
        Use to retrieve events for city name(s).
        - geoCityName=Seattle

        Use a pipe (|) to include multiple city names.
        - geoCityName=Seattle|Tacoma

        For more precise city-specific results try using `city[id]`
      schema:
        type: string
    geoCityIdParam:
      in: query
      name: geoCityId
      description: |
        Use to retrieve events for specific <a href="https://apidocs.jambase.com/docs/jambase-api/5474ac2525de2-search-cities">JamBase city ID(s)</a>   .     
        - geoCityId=jambase:4223296

        Use a pipe (|) to include multiple city IDs.
        - geoCityId=jambase:4223296|jambase:4224564

        When using the `geoCityId` parameter, you can omit the the `geoRadiusAmount` parameter (or) set it to `0` (or) leave it empty to include only results from the city. Else, you can use a radius amount to include events within a radius around the city-center.
      example: 'jambase:4223296'
      schema:
        type: string
    geoIpParam:
      in: query
      name: geoIp
      description: |
        Use to retrieve events near an IP address.\
        Supports IPv4 or IPv6 values.
        - geoIp=55.123.456.789
      schema:
        oneOf:
          - type: string
            format: ipv4
          - type: string
            format: ipv6
    geoRadiusAmountParam:
      in: query
      name: geoRadiusAmount
      description: |
        The search radius for lat/lng type searches.
        - geoRadiusAmount=60
      schema:
        type: number
        format: int32
        minimum: 1
        maximum: 5000
        default: 60
    geoRadiusUnitsParam:
      in: query
      name: geoRadiusUnits
      description: |
        Whether to use miles (default) or kilometers for radius.
        - geoRadiusUnits=km
      schema:
        $ref: '#/components/schemas/enumRadiusUnits'
    geoCountryIso2Param:
      in: query
      name: geoCountryIso2
      description: |
        The two-letter ISO code for a country.
        - geoCountryIso2=US

        Use a pipe (|) to include multiple countries.
        - geoCountryIso2=US|CA
      schema:
        $ref: '#/components/schemas/enumCountryIso2'
    geoCountryIso3Param:
      in: query
      name: geoCountryIso3
      description: |
        The three-letter ISO code for a country.
        - geoCountryIso3=USA

        Use a pipe (|) to include multiple countries.
        - geoCountryIso3=USA|CAN
      schema:
        $ref: '#/components/schemas/enumCountryIso3'
    datePresetParam:
      in: query
      name: eventDatePreset
      description: |
        Use a dynamic date preset.
        - eventDatePreset=tomorrow

        Notes: 
        - The `eventDatePreset` will override `eventDateFrom` & `eventDateTo` if those are set as well.
        - The `halloween` preset returns events on 10/31 only. The `newYears` preset returns events on 12/31 only. The `july4th` preset returns events on or near July 4th.
      example: tomorrow
      schema:
        $ref: '#/components/schemas/enumDatePresets'
    dateFromParam:
      in: query
      name: eventDateFrom
      description: |
        For `concerts` must start on or after this date.\
        For `festivals`, must start on or after this date.\
        If left blank or omitted, will use the current date.\
        The `expandPastEvents` parameter is required when using `eventDateFrom` before the current date.

        - eventDateFrom=2023-10-31

        Note: Dates use <a href="https://www.rfc-editor.org/rfc/rfc3339#section-5.6">RFC3339</a> format.
      example: '2023-10-01'
      schema:
        type: string
        format: date
    dateToParam:
      in: query
      name: eventDateTo
      description: |
        For `concerts` must start on or before this date.\
        For `festivals` must end on or before this date.\
        If left blank or omitted, will return all events after `eventDateFrom`.

        - eventDateTo=2023-12-31

        Note: Dates use <a href="https://www.rfc-editor.org/rfc/rfc3339#section-5.6">RFC3339</a> format.
      example: '2023-12-31'
      schema:
        type: string
        format: date
    dateModifiedFromParam:
      in: query
      name: dateModifiedFrom
      description: |
        Must have been updated on or after this dateTime in GMT.\
        If left blank or omitted, will use all updated on dates

        - dateModifiedFrom=2022-10-31 00:00:00

        Note: Use <a href="https://www.rfc-editor.org/rfc/rfc3339#section-5.6">RFC3339</a> format for parameter values.
      example: '2022-10-31 00:00:00'
      schema:
        type: string
        format: rfc3339
    datePublishedFromParam:
      in: query
      name: datePublishedFrom
      description: |
        Must have been first published on or after this dateTime in GMT.\
        \
        If left blank or omitted, will use all first published on dates.

        - datePublishedFrom=2022-01-01 00:00:00

        Note: Use <a href="https://www.rfc-editor.org/rfc/rfc3339#section-5.6">RFC3339</a> format for parameter values.
      example: '2022-01-01 00:00:00'
      schema:
        type: string
        format: rfc3339
    streamDataSourceParam:
      in: query
      name: streamDataSource
      description: |
        Find events with ticketing links from a specific ticket vendor using streamDataSources [[enum](#)].\
        \
        For example to find events with Mandolin tickets:

        - streamDataSource=mandolin

        Use a pipe (|) to include multiple ticket vendors.\
        \
        For example to find events with Mandolin or StageIt tickets:

        - streamDataSource=mandolin|stageit

        | Name        | Identifier        |
        | ----------- | ----------- |
        | Mandolin | mandolin |
        | StageIt | stageit |
      schema:
        type: string
        format: pipeDelimited
    excludeEventPerformersParam:
      in: query
      name: excludeEventPerformers
      description: |
        Use `true` to suppress the `performer` node in `Concert` and `Festival` objects.
      schema:
        type: boolean
        default: false
    expandPastEventsParam:
      in: query
      name: expandPastEvents
      description: |
        Use `true` to include past/historical `Concert` and `Festival` objects.
        \
        When searching events, must be combined with `artistId` or `venueId` parameter.
        \
        Note: The `expandPastEvents` parameter requires that your apikey has the `expandPastEvents` enhancement turned on. Please contact JamBase to request access to this feature.
      schema:
        type: boolean
        default: false
    expandExternalIdentifiersParam:
      in: query
      name: expandExternalIdentifiers
      description: |
        Use `true` to include external IDs for `Concert`, `Artist`, and `Venue` objects.
        \
        Note: The `expandExternalIdentifiers` parameter requires that your apikey has the `expandExternalIdentifiers` enhancement turned on. Please contact JamBase to request access to this feature.
      schema:
        type: boolean
        default: false
    expandArtistSameAsParam:
      in: query
      name: expandArtistSameAs
      description: |
        Use `true` to include `sameAs` (i.e. links) for `Artist` responses.
      schema:
        type: boolean
        default: false
