              required: true
            validFrom:
              example: '2022-12-07T12:42:00'
              schema:
                type: string
                format: dateTime
    Organization:
      title: Organization
      description: |
        An organization or business.\
        Typically a ticket vendor or data source in this API.\
        The `identifier` or "slug" can also be used as `ticket[vendor][id]` in `/events` and `/livestreams` search endpoints.
      type: object
      required:
        - name
        - identifier
        - disambiguatingDescription
        - datePublished
        - dateModified
      allOf:
        - type: object
          properties:
            '@type':
              type: string
              enum:
                - Organization
            identifier:
              type: string
              description: A unique identifier of the item
              example: ticketmaster
            disambiguatingDescription:
              type: string
              examples:
                - eventTicketVendorPrimary
                - eventTicketVendorSecondary
                - streamTicketVendorPrimary
                - streamDataSource
                - eventDataSource
                - artistDataSource
                - venueDataSource
        - $ref: '#/components/schemas/Thing'
    Pagination:
      title: Pagination
      description: Enclosure for pagination values.
      type: object
      properties:
        page:
          type: integer
          description: The current page of results.
          example: 1
          minimum: 0
        perPage:
          type: integer
          description: Number of events per page of results.
          example: 10
          minimum: 1
        totalItems:
          type: integer
          description: Total results for the request.
          example: 50
          minimum: 0
        totalPages:
          type: integer
          description: Total pages for the request.
          example: 5
          minimum: 0
        nextPage:
          type: string
          format: url
          description: 'The URL for the next page of results, if available'
        previousPage:
          type: string
          format: url
          description: 'The URL for the previous page of results, if available'
    PriceSpecification:
      title: PriceSpecification
      description: The price or price range for the thing
      type: object
      required:
        - price
        - priceCurrency
      properties:
        '@type':
          type: string
          enum:
            - PriceSpecification
        minPrice:
          description: The lowest price if the price is a range
          type: number
          format: decimal
          min: 0
          example: 15.99
        maxPrice:
          description: The highest price if the price is a range
          type: number
          format: decimal
          min: 0
          example: 35.99
        price:
          description: 'The singular price if not a range, same as `minPrice` if a range'
          type: number
          format: decimal
          min: 0
          example: 35.99
        priceCurrency:
          type: string
          format: iso-4217
          description: 'The currency of the price in ISO 4217 format [[docs](https://en.wikipedia.org/wiki/ISO_4217)]'
          example: USD
    PostalAddress:
      title: PostalAddress
      description: 'A postal address, typically for a MusicVenue'
      type: object
      properties:
        '@type':
          type: string
          enum:
            - PostalAddress
        streetAddress:
          type: string
          example: 4 Pennsylvania Plaza
          description: The street address
        addressLocality:
          type: string
          example: New York
          description: The city/locality in which the place is in
        postalCode:
          type: string
          example: '10001'
          description: The postal code
        addressRegion:
          allOf:
            - $ref: '#/components/schemas/State'
        addressCountry:
          allOf:
            - $ref: '#/components/schemas/Country'
        x-streetAddress2:
          type: string
          example: Second Floor
          description: An optional second line for street address.
        x-timezone:
          type: string
          description: |
            A "tz database" timezone [[see list](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones)].
          example: America/New_York
        x-jamBaseMetroId:
          type: number
          format: int32
          example: 1
          description: A unique identifier to the JamBase metro.
        x-jamBaseCityId:
          type: number
          format: int32
          example: 4223296
          description: A unique identifier to the JamBase city.
    Request:
      title: Request
      description: Enclosure for request details.
      type: object
      properties:
        endpoint:
          type: string
          format: url
          description: The base endpoint requested
        method:
          type: string
          description: 'The request method (e.g. GET, POST)'
        params:
          type: array
          items: {}
          format: string
          description: The parameters for the request
        ip:
          oneOf:
            - type: string
              format: ipv4
            - type: string
              format: ipv6
          description: 'The requesting IP address, IPv4 or IPv6'
        userAgent:
          type: string
          format: string
          description: The requesting UserAgent
    State:
      title: State
      description: |
        A State, Region, or Province.
        \
        Note 1: Available for United States, Canada, and Australia only.
        \
        Note 2: The `country` and `x-numUpcomingEvents` nodes are only provided in the Geography lookup endpoints, not as part of `addressRegion` within a Concert, Festival, or Stream.
      type: object
      x-stoplight:
        id: rbp08k99t5o7m
      properties:
        '@type':
          type: string
          enum:
            - State
        identifier:
          $ref: '#/components/schemas/enumState'
        name:
          type: string
          example: Arizona
          description: The name of the State
        alternateName:
          type: string
          example: AZ
          description: The indentifier without the Country code prefix
        country:
          $ref: '#/components/schemas/Country'
          description: |
            The country in which the state belongs.
            \
            Note: this is only provided in the Geography lookup endpoints, not as part of a location's `addressCountry` within a Concert, Festival, or Stream.
        x-numUpcomingEvents:
          type: number
          format: int32
          example: 12
          description: |
            The number of upcoming events in this State.
            \
            Note: this is only provided in the Geography lookup endpoints, not as part of a location within a Concert, Festival, or Stream.
    Stream:
      title: Stream
      description: A stream
      type: object
      required:
        - type
        - name
        - identifier
        - url
        - eventStatus
        - startDate
        - location
        - performer
      allOf:
        - $ref: '#/components/schemas/Event'
        - type: object
          properties:
            '@type':
              type: string
              enum:
                - Stream
            isLiveBroadcast:
              type: boolean
              description: True if the broadcast is of a live event
            broadcastOfEvent:
              type: array
              items:
                oneOf:
                  - $ref: '#/components/schemas/Concert'
                  - $ref: '#/components/schemas/Festival'
            x-customTitle:
              type: string
              description: 'To replace the default `event[name]` property'
      x-stoplight:
        id: fijmf4s5a9h9x
    Success:
      name: success
      description: A successful response.
      type: boolean
      default: true
    Thing:
      title: Thing
      description: A generic thing
      type: object
      properties:
        name:
          type: string
          description: The name of the item
        identifier:
          type: string
          example: 'jambase:194164'
          description: A unique identifier of the item
        url:
          type: string
          format: uri
          description: URL of the item
        image:
          type: string
          format: uri
          description: |
            An image of the item.\
            \
            Please note that 'image' may not be provided for all Schemas that include `Thing` (e.g. `Organization`)
        sameAs:
          type: array
          items:
            $ref: '#/components/schemas/URL'
          description: URL of a reference Web page that unambiguously indicates the item's identity
        datePublished:
          type: string
          format: iso-8601
          example: '2022-12-14T15:35:48Z'
          description: |
            The date the Event first appeared in ISO 8601 date format [[docs](https://en.wikipedia.org/wiki/ISO_8601)]
            \
            Please note that 'datePublished' may not be provided for all Schemas that include `Thing` (e.g. `Organization`)
        dateModified:
          type: string
          format: iso-8601
          example: '2022-12-14T03:41:20Z'
          description: |
            The date the Event was last updated in ISO 8601 date format [[docs](https://en.wikipedia.org/wiki/ISO_8601)]
            \
            Please note that 'dateModified' may not be provided for all Schemas that include `Thing` (e.g. `Organization`)
    URL:
      title: URL
      x-stoplight:
        id: ac90d6bc4bf17
      description: A third-party link.
      type: object
      properties:
        '@type':
          type: string
          enum:
            - URL
        identifier:
          $ref: '#/components/schemas/enumUrlType'
        url:
          type: string
          format: uri
          description: The URL of the external link.
    propLatitude:
      title: propLatitude
      type: number
      format: float
      minimum: -90
      maximum: 90
      example: 40.7505
      description: The latitude of a location
      x-stoplight:
        id: 0gf3yu2lypo1r
    propLongitude:
      title: propLongitude
      type: number
      format: float
      minimum: -180
      maximum: 180
      example: -73.9934
      description: The longitude of a location
      x-stoplight:
        id: udrk05v1mvsv9
  responses:
    searchEventsResponse:
      description: A list of Events
      content:
        application/json:
          schema:
            title: searchEventsResponseSchema
            description: An array of `Concerts` and `Festivals`.
            type: object
            properties:
              success:
                $ref: '#/components/schemas/Success'
              pagination:
                $ref: '#/components/schemas/Pagination'
              events:
                type: array
                items:
                  oneOf:
                    - $ref: '#/components/schemas/Concert'
                    - $ref: '#/components/schemas/Festival'
              request:
                $ref: '#/components/schemas/Request'
    getSingleUpcomingEventResponse:
      description: A single Event
      content:
        application/json:
          schema:
            title: getSingleUpcomingEventResponseSchema
            description: A single `Concert` or `Festival`.
            type: object
            properties:
              success:
                $ref: '#/components/schemas/Success'
              event:
                oneOf:
                  - $ref: '#/components/schemas/Concert'
                  - $ref: '#/components/schemas/Festival'
    searchUpcomingStreamsResponse:
      description: A list of Streams
      content:
        application/json:
          schema:
            title: searchUpcomingStreamsResponseSchema
            description: An array of `Stream` objects.
            type: object
            properties:
              success:
                $ref: '#/components/schemas/Success'
              pagination:
                $ref: '#/components/schemas/Pagination'
              streams:
                type: array
                items:
                  $ref: '#/components/schemas/Stream'
              request:
                $ref: '#/components/schemas/Request'
    getSingleUpcomingStreamResponse:
      description: A single Stream (`Stream`).
      content:
        application/json:
          schema:
            title: getSingleUpcomingStreamResponseSchema
            description: A single stream response
            properties:
              success:
                $ref: '#/components/schemas/Success'
              stream:
                $ref: '#/components/schemas/Stream'
    searchArtistsResponse:
      description: A list of Artists
      content:
        application/json:
          schema:
            title: searchArtistsResponseSchema
            description: An array of `MusicGroup` objects
            type: object
            properties:
              success:
                $ref: '#/components/schemas/Success'
              pagination:
                $ref: '#/components/schemas/Pagination'
              artists:
                type: array
                items:
                  $ref: '#/components/schemas/MusicGroup'
              request:
                $ref: '#/components/schemas/Request'
    getSingleArtistResponse:
      description: A single Artist
      content:
        application/json:
          schema:
            title: getSingleArtistResponseSchema
            description: A single Artist response
            properties:
              success:
                $ref: '#/components/schemas/Success'
              artist:
                $ref: '#/components/schemas/MusicGroup'
    searchVenuesResponse:
      description: A list of Venues
      content:
        application/json:
          schema:
            title: searchVenuesResponseSchema
            description: An array of `MusicVenue` objects
            type: object
            properties:
              success:
                $ref: '#/components/schemas/Success'
              pagination:
                $ref: '#/components/schemas/Pagination'
              venues:
                type: array
                items:
                  $ref: '#/components/schemas/MusicVenue'
              request:
                $ref: '#/components/schemas/Request'
    getSingleVenueResponse:
      description: A single Venue
      content:
        application/json:
          schema:
            title: getSingleVenueResponseSchema
            description: A single Venue response
            properties:
              success:
                $ref: '#/components/schemas/Success'
              venue:
                $ref: '#/components/schemas/MusicVenue'
    BadRequest:
      description: Invalid input parameter
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                default: false
              errors:
                $ref: '#/components/schemas/ErrorsList'
    UnauthorizedError:
      description: API key is missing or invalid
      headers:
        WWW_Authenticate:
          schema:
            type: string
servers:
  - url: 'https://www.jambase.com/jb-api/v1'
    description: 'JamBase.com [Production]'
x-internal: false
